name: Generate Snake

on:
  # ⏰ Uncomment below when ready to run daily
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: HarshBhanushali07
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=ffffff&color_dots=#c6e48b,#c6e48b,#7bc96f,#239a3b,#196127
            dist/github-contribution-grid-snake-dark.svg?color_snake=ffffff&color_dots=#0e4429,#0e4429,#006d32,#26a641,#39d353

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
